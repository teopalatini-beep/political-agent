# fly.toml — political-agent-teo
app = 'political-agent-teo'
primary_region = 'gru'

[build]

# Sin HTTP service — el bot usa long polling, no webhooks
# La máquina corre 24/7 sin dormir
[env]
  TZ = "America/Argentina/Buenos_Aires"
  NEWSLETTER_HOUR = "8"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "5s"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
